# Auto-approve rules for Bash commands.
# First match wins. No match = normal permission prompt.
#
# Rule value formats:
#   string          single pattern (shlex-aware, prefix match by default)
#   list            each item is a standalone pattern string
#   dict (trie)     keys are prefix patterns, values are lists of allowed next tokens (or nested dicts)
#
# Pattern syntax (within strings):
#   word        literal token match
#   *           any single token
#   (a|b|c)     alternation
#   "text *"    one token matching glob (* = any chars)
#   $           end anchor: no extra args allowed
#
# Use allow-regex: / deny-regex: / ask-regex: for raw regex fallback.

# ── Shared anchors ───────────────────────────────────────────────
# These are reused in both `rules` (local) and `ssh-rules` (remote).

# Read-only shell commands safe both locally and over SSH
_ssh_safe_cmds: &ssh-safe-cmds
  - awk
  - cat
  - cd
  - cut
  - df
  - du
  - echo
  - env
  - file
  - find
  - getfacl
  - grep
  - head
  - hostname
  - ls
  - mount
  - ps
  - pwd
  - readlink
  - sort
  - stat
  - tail
  - tr
  - tree
  - uname
  - uniq
  - wc
  - which
  - whoami

# Read-only git subcommands safe both locally and over SSH
_ssh_safe_git: &ssh-safe-git
  - branch
  - diff
  - log
  - ls-files
  - ls-tree
  - merge-base
  - reflog
  - remote
  - rev-list
  - rev-parse
  - show
  - show-ref
  - stash
  - status
  - tag

rules:
  # ── Git (read-only) ─────────────────────────────────────────────
  - allow:
      git:
        - cat-file
        - check-ignore
        - clone
        - config
        - diff-x
        - fetch
        - init
        - mv
      git -C *: *ssh-safe-git
  - allow:
      git: *ssh-safe-git

  # ── GitHub / GitLab CLI ────────────────────────────────────────
  - ask-regex: '^gh api .*(-X |--method |-f |-F |--input |--raw-field )'
  - allow:
      gh api: ~
      gh auth: [status]
      gh issue: [list, view]
      gh pr: [checks, list, view]
      gh release: [edit, list, view]
      gh repo: [list, view]
      gh run: [download, list, rerun, view, watch]
      gh search: ~
      gh secret: [list]
      gh variable: [get, list]
      gh workflow: [list]
      gh gist: [list, view]
      glab: [api, ci]

  # ── Shell read-only / inspection ───────────────────────────────
  - allow: *ssh-safe-cmds
  - allow:
    - alias
    - bc
    - col
    - dig
    - ffprobe
    - gzip
    - gunzip
    - hexdump
    - identify
    - jq
    - lsof
    - md5
    - pdfinfo
    - pgrep
    - printf
    - rg
    - sed
    - sips
    - sleep
    - sqlite3
    - tar
    - tee
    - test
    - touch
    - type
    - wait
    - xargs
    - xq
    - xxd
    - yq
    - zip
  - allow: /usr/bin/(col|stat)
  - allow: "["

  # ── macOS ───────────────────────────────────────────────────────
  - allow: defaults read
  - allow: /usr/libexec/PlistBuddy -c "Print *"
  - allow:
    - diskutil
    - open

  # ── Python ─────────────────────────────────────────────────────
  - allow:
    - python
    - python3
    - "python3.*"
    - python -c
    - python -m pytest
    - pytest
    - ruff
  - allow:
      pip: [download, index, install, show, uninstall]
      pipx: [inject, install, list]
      uv: [add, build, lock, pip, run, sync, tree]
      uvx: [pre-commit, ruff]

  # ── Build artifact / temp cleanup ────────────────────────────
  - allow:
      rm -rf:
        - node_modules/.vite
        - node_modules/.cache
        - node_modules
        - dist
        - build
        - .next
        - .nuxt
        - __pycache__
        - .pytest_cache
        - target/debug
        - target/release
  - allow: rm -rf "/tmp/*"

  # ── Node / pnpm ───────────────────────────────────────────────
  - allow:
    - node
    - node -e
  - allow:
      pnpm: &pnpm-subcmds [add, approve-builds, audit, build, bundle, clean, config, create, dev, info, install, lint, list, ls, outdated, rebuild, remove, run, scrns, search, start, tc, test, tsc, typecheck, update, vitest, why]
      pnpm -s: *pnpm-subcmds
      pnpm --silent: *pnpm-subcmds
      pnpm -C *: *pnpm-subcmds
      pnpm --dir *: *pnpm-subcmds
      pnpm exec: &pnpm-exec-subcmds [playwright, tsc]
      pnpm -C * exec: *pnpm-exec-subcmds
      pnpm --dir * exec: *pnpm-exec-subcmds
      npm: [install, pack, run, search, test, view]
      npx: [eslint, playwright, scrns, tsc, tsx, vite, vitest]

  # ── Cargo / Rust ───────────────────────────────────────────────
  - allow:
      cargo: [build, check, clippy, doc, install, metadata, run, search, test, tree]
  - allow: wasm-pack build

  # ── AWS (read-only) ───────────────────────────────────────────
  - allow:
      aws s3: [ls]
      aws s3api: [get-bucket-cors, get-bucket-policy, get-public-access-block, head-object]
      aws sts: [get-caller-identity]
  - allow-regex: '^aws (logs |ec2 describe-)'

  # ── Other tools ────────────────────────────────────────────────
  - allow:
    - brew
    - chmod
    - diff-x
    - ffmpeg
    - git-diff-x
    - git-didi
    - gs
    - juq
    - ln
    - magick
    - mdcmd
    - mkdir
    - mktoc
    - pandoc
    - pdfseparate
    - scrns
    - source
    - "yes"
  - allow:
      dvx: [add, diff, import-url, run, status, version, --help]
  - allow-regex: '^curl (-s )?https?://localhost[:/]'

  # ── Project helpers ────────────────────────────────────────────
  - allow:
    - bmdf
    - ghpr
    - pds
    - pqa
    - pqh
    - pqm
    - pqn
    - pqs
    - pqtl
  - allow:
      gws auth: [status]
      gws docs documents: [get]

# ── SSH remote command rules ───────────────────────────────────────
# These are evaluated INSTEAD OF the main rules for commands inside
# `ssh host "cmd"`. Only truly read-only commands belong here.
ssh-rules:
  - allow: *ssh-safe-cmds
  - allow:
      git: *ssh-safe-git
      git -C *: *ssh-safe-git
